<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>食用手册 (Edible Manual)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Serif SC', serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Screen Transitions */
      .screen-container {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        overflow: hidden;
        backface-visibility: hidden;
        perspective: 1000px;
      }

      .slide-in-right {
        animation: slideInRight 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      
      .slide-out-left {
        animation: slideOutLeft 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      .slide-in-left {
        animation: slideInLeft 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      .slide-out-right {
        animation: slideOutRight 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes slideInRight {
        from { transform: translate3d(100%, 0, 0); }
        to { transform: translate3d(0, 0, 0); }
      }

      @keyframes slideOutLeft {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(-30%, 0, 0); opacity: 0; }
      }

      @keyframes slideInLeft {
        from { transform: translate3d(-30%, 0, 0); opacity: 0; }
        to { transform: translate3d(0, 0, 0); opacity: 1; }
      }

      @keyframes slideOutRight {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(100%, 0, 0); }
      }

      /* Animations */
      @keyframes float {
        0% { transform: translateY(0px) rotate(var(--tw-rotate)); }
        50% { transform: translateY(-10px) rotate(var(--tw-rotate)); }
        100% { transform: translateY(0px) rotate(var(--tw-rotate)); }
      }
      
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes wiggle {
        0%, 100% { transform: rotate(-1deg); }
        50% { transform: rotate(1deg); }
      }
      
      .hover\:animate-wiggle:hover {
        animation: wiggle 0.3s ease-in-out infinite;
      }

      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.9) translateY(10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }

      .animate-pop-in > * {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
      }

      .text-shadow-sticker {
        text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'app-bg': '#efffd6', 
              'app-yellow': '#FEFA83', 
              'app-orange': '#ffbf6b', 
              'app-gray': '#6c6c6c',
              'app-border': '#bbbbbb',
              'app-green-btn': '#8fd3bd',
              'app-item-green': '#a8d67e',
              'app-item-red': '#fb7676',
              'app-item-yellow': '#FFBF6B',
            },
            boxShadow: {
              'hard': '0px 4px 4px rgba(0, 0, 0, 0.4)',
              'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
<link rel="stylesheet" href="/src/chat-ui.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script type="module" src="/src/chat-ui.js"></script>

    <!-- 悬浮按钮 -->
<button id="agent-fab" class="chat-agent__fab">
  <span class="chat-agent__fab-icon">🧑‍🍳</span>
</button>

<!-- 统计入口按钮 -->
<button id="agent-stats-btn" class="chat-agent__stats-btn">📊 历史</button>

<!-- 对话面板 -->
<div id="agent-panel" class="chat-agent__panel">
  <div class="chat-agent__header">
    <h3 class="chat-agent__title">小食 AI助手</h3>
    <button id="agent-close-btn" class="chat-agent__close">&times;</button>
  </div>

  <!-- 烹饪进度条 -->
  <div id="agent-progress-container" class="chat-agent__progress-container chat-agent__hidden">
    <div class="chat-agent__progress-info">
      <span id="agent-progress-recipe" class="chat-agent__progress-recipe"></span>
      <span id="agent-progress-step" class="chat-agent__progress-step"></span>
    </div>
    <div class="chat-agent__progress-bar">
      <div id="agent-progress-fill" class="chat-agent__progress-fill"></div>
    </div>
  </div>

  <!-- 消息区域 -->
  <div id="agent-messages" class="chat-agent__messages">
    <div class="chat-agent__message chat-agent__message--agent">
      <div class="chat-agent__bubble">你好！我是小食，今天想做点什么好吃的？你可以对我说“开始做菜”。</div>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="chat-agent__input-area">
    <button id="agent-camera-btn" class="chat-agent__icon-btn">📷</button>
    <button id="agent-voice-btn" class="chat-agent__icon-btn chat-agent__voice-btn">🎙️</button>
    <input type="text" id="agent-input" class="chat-agent__input" placeholder="问问小食...">
    <button id="agent-send-btn" class="chat-agent__send-btn">发送</button>
  </div>
</div>

<!-- 评分弹窗 -->
<div id="agent-rating-modal" class="chat-agent__modal chat-agent__hidden">
  <div class="chat-agent__modal-content">
    <h4 class="chat-agent__modal-title">烹饪完成！请评分</h4>
    <div id="agent-stars" class="chat-agent__stars">
      <span class="chat-agent__star" data-value="1">★</span>
      <span class="chat-agent__star" data-value="2">★</span>
      <span class="chat-agent__star" data-value="3">★</span>
      <span class="chat-agent__star" data-value="4">★</span>
      <span class="chat-agent__star" data-value="5">★</span>
    </div>
    <button id="agent-submit-rating" class="chat-agent__btn-primary">提交评分</button>
  </div>
</div>

<!-- 统计面板 -->
<div id="agent-stats-modal" class="chat-agent__modal chat-agent__hidden">
  <div class="chat-agent__modal-content">
    <h4 class="chat-agent__modal-title">烹饪历史</h4>
    <ul id="agent-stats-list" class="chat-agent__stats-list">
      <!-- 动态插入 -->
    </ul>
    <button id="agent-close-stats" class="chat-agent__btn-secondary">关闭</button>
  </div>
</div>


</body>
</html>
