<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>食用手册 (Edible Manual)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Serif SC', serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Screen Transitions */
      .screen-container {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        overflow: hidden;
        backface-visibility: hidden;
        perspective: 1000px;
      }

      .slide-in-right {
        animation: slideInRight 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      
      .slide-out-left {
        animation: slideOutLeft 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      .slide-in-left {
        animation: slideInLeft 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      .slide-out-right {
        animation: slideOutRight 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes slideInRight {
        from { transform: translate3d(100%, 0, 0); }
        to { transform: translate3d(0, 0, 0); }
      }

      @keyframes slideOutLeft {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(-30%, 0, 0); opacity: 0; }
      }

      @keyframes slideInLeft {
        from { transform: translate3d(-30%, 0, 0); opacity: 0; }
        to { transform: translate3d(0, 0, 0); opacity: 1; }
      }

      @keyframes slideOutRight {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(100%, 0, 0); }
      }

      /* Animations */
      @keyframes float {
        0% { transform: translateY(0px) rotate(var(--tw-rotate)); }
        50% { transform: translateY(-10px) rotate(var(--tw-rotate)); }
        100% { transform: translateY(0px) rotate(var(--tw-rotate)); }
      }
      
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes wiggle {
        0%, 100% { transform: rotate(-1deg); }
        50% { transform: rotate(1deg); }
      }
      
      .hover\:animate-wiggle:hover {
        animation: wiggle 0.3s ease-in-out infinite;
      }

      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.9) translateY(10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }

      .animate-pop-in > * {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
      }

      .text-shadow-sticker {
        text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'app-bg': '#efffd6', 
              'app-yellow': '#FEFA83', 
              'app-orange': '#ffbf6b', 
              'app-gray': '#6c6c6c',
              'app-border': '#bbbbbb',
              'app-green-btn': '#8fd3bd',
              'app-item-green': '#a8d67e',
              'app-item-red': '#fb7676',
              'app-item-yellow': '#FFBF6B',
            },
            boxShadow: {
              'hard': '0px 4px 4px rgba(0, 0, 0, 0.4)',
              'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
            }
          }
        }
      }
    </script>
